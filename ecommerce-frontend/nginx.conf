server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_vary on;

    # Cache static assets aggressively (Vite hashes filenames)
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|ico|png|jpe?g|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy /api/* to the backend service
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Forward cookies (needed for httpOnly auth cookies)
        proxy_pass_header  Set-Cookie;
        proxy_set_header   Cookie $http_cookie;
    }

    # React Router — serve index.html for every other path
    location / {
        try_files $uri $uri/ /index.html;
    }
}
