name: Bug report
description: Something isn't working as expected
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description.
      placeholder: When I click "Pay" on the checkout page…
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to /cart
        2. Click "Proceed to Checkout"
        3. ...
    validations:
      required: true
  - type: input
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Where does it happen?
      options:
        - Frontend (customer)
        - Frontend (admin)
        - Backend API
        - Both
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Browser / OS
      placeholder: Chrome 119 on macOS 14
  - type: textarea
    id: logs
    attributes:
      label: Console logs / network errors / screenshots
      render: shell
