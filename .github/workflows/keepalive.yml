name: Keep Render backend awake                                                                                                                                                                         
                                                                                                                                                                                                          
on:
  schedule:                                                                                                                                                                                             
    - cron: "*/10 * * * *"                                                                                                                                                                            
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2                                                                                                                                                                                  
    steps:
      - name: Ping backend health endpoint                                                                                                                                                              
        run: |                                                                                                                                                                                        
          URL="https://ecommerce-app-8sgn.onrender.com/api/health"
          STATUS=$(curl -s -L -o /dev/null --max-time 60 -w "%{http_code}" "$URL" || echo "000")                                                                                                        
          echo "Response status: $STATUS"                                                                                                                                                               
          if [ "$STATUS" -ne 200 ]; then                                                                                                                                                                
            echo "::warning::Health check returned non-200: $STATUS"                                                                                                                                    
          fi
